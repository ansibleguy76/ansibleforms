# Just the Docs Configuration
# https://just-the-docs.com/

# Theme (use remote_theme for GitHub Actions)
remote_theme: just-the-docs/just-the-docs@v0.8.2

# Site settings
title: AnsibleForms Documentation
description: Technical documentation for AnsibleForms
baseurl: "" # Empty for custom domain
url: "https://ansibleforms.com" # Custom domain

# Color scheme (light or dark)
color_scheme: light

# Enable color scheme toggle button
# Users can switch between light and dark mode
callouts_level: quiet
callouts:
  note:
    color: blue
  warning:
    color: yellow

# Logo and Favicon
logo: "/assets/images/logo.png"
favicon_ico: "/favicon.svg"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation
nav_sort: case_insensitive

# Aux links (top right)
aux_links:
  "GitHub":
    - "https://github.com/ansibleguy76/ansibleforms"
  "Docker Hub":
    - "https://hub.docker.com/r/ansibleguy/ansibleforms"

# Footer
footer_content: "Copyright &copy; 2023-2026 AnsibleForms. All rights reserved."

# Code highlighting
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: yaml
    block:
      line_numbers: false
    span:
      line_numbers: false

# Configure Rouge highlighter
highlighter: rouge

# Collections
collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme
